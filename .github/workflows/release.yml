name: Create Release on Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --target . --platform manylinux2014_aarch64 --python-version 3.13 --only-binary=:all:

      - name: Build Zip
        env:
          TAG: ${{ github.ref_name }}
        run: |
          zip -r "qlik-agent-${TAG}.zip" . -x "*.git*" -x ".github/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: qlik-agent-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
